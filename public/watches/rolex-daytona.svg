<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#040404"/>
    </radialGradient>
    <radialGradient id="dial" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Case (Oyster, slightly larger than Submariner) -->
  <ellipse cx="200" cy="245" rx="140" ry="144" fill="#c0c0c0"/>
  <ellipse cx="200" cy="245" rx="136" ry="140" fill="#d8d8d8"/>

  <!-- Cerachrom bezel (black) -->
  <circle cx="200" cy="245" r="130" fill="#0d0d0d"/>
  <circle cx="200" cy="245" r="126" fill="#0a0a0a"/>

  <!-- Tachymeter scale on bezel -->
  <circle cx="200" cy="245" r="122" fill="none" stroke="#c8a84b" stroke-width="0.6" opacity="0.4"/>
  <g font-family="Arial" font-size="6.5" fill="#c8a84b" text-anchor="middle" opacity="0.9">
    <text x="200" y="129" transform="rotate(0,200,245)">400</text>
    <text x="200" y="129" transform="rotate(30,200,245)">250</text>
    <text x="200" y="129" transform="rotate(60,200,245)">180</text>
    <text x="200" y="129" transform="rotate(90,200,245)">150</text>
    <text x="200" y="129" transform="rotate(120,200,245)">120</text>
    <text x="200" y="129" transform="rotate(150,200,245)">100</text>
    <text x="200" y="129" transform="rotate(180,200,245)">90</text>
  </g>
  <!-- Tachymeter ticks -->
  <g stroke="#c8a84b" stroke-width="1" opacity="0.6">
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(0,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(30,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(60,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(90,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(120,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(150,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(180,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(210,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(240,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(270,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(300,200,245)"/>
    <line x1="200" y1="123" x2="200" y2="131" transform="rotate(330,200,245)"/>
  </g>

  <!-- Inner bezel ring -->
  <circle cx="200" cy="245" r="112" fill="#111" stroke="#2a2a2a" stroke-width="0.8"/>

  <!-- Dial (black) -->
  <circle cx="200" cy="245" r="108" fill="url(#dial)"/>
  <circle cx="200" cy="245" r="104" fill="#0f0f0f"/>

  <!-- 3 sub-dials (white/silver = inverted Panda) -->
  <!-- 9h running seconds -->
  <circle cx="148" cy="253" r="26" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <g stroke="#333" stroke-width="0.5" opacity="0.5">
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(30,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(60,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(90,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(120,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(150,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(180,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(210,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(240,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(270,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(300,148,253)"/>
    <line x1="148" y1="229" x2="148" y2="234" transform="rotate(330,148,253)"/>
  </g>
  <line x1="148" y1="253" x2="148" y2="233" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  <text x="148" y="272" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#555">60</text>
  <text x="148" y="243" text-anchor="middle" font-family="Arial" font-size="4.5" fill="#777">30</text>

  <!-- 3h 12-hour counter -->
  <circle cx="252" cy="253" r="26" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <line x1="252" y1="253" x2="252" y2="233" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  <text x="252" y="272" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#555">12</text>

  <!-- 6h 30-min counter -->
  <circle cx="200" cy="310" r="22" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
  <line x1="200" y1="310" x2="200" y2="294" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  <text x="200" y="326" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#555">30</text>

  <!-- Hour indices -->
  <g fill="#e8e8e8" opacity="0.9">
    <rect x="196" y="158" width="5" height="14" rx="1"/>
    <rect x="203" y="158" width="5" height="14" rx="1"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(30,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(60,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(90,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(120,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(150,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(180,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(210,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(240,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(270,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(300,200,245)"/>
    <rect x="196" y="158" width="8" height="14" rx="1" transform="rotate(330,200,245)"/>
  </g>

  <!-- Brand -->
  <text x="200" y="204" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8a84b" letter-spacing="2">ROLEX</text>
  <text x="200" y="216" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#777" letter-spacing="1">OYSTER PERPETUAL</text>
  <text x="200" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="#aaa" letter-spacing="1.5">COSMOGRAPH DAYTONA</text>

  <!-- Hands -->
  <g transform="rotate(-80, 200, 245)">
    <rect x="197.5" y="168" width="5" height="80" rx="2.5" fill="#e8e8e8"/>
  </g>
  <g transform="rotate(20, 200, 245)">
    <rect x="198" y="182" width="4" height="62" rx="2" fill="#e8e8e8"/>
  </g>
  <!-- Chrono center seconds (gold) -->
  <g transform="rotate(100, 200, 245)">
    <rect x="199.5" y="160" width="1.5" height="76" rx="0.75" fill="#c8a84b"/>
    <rect x="199.5" y="236" width="1.5" height="22" rx="0.75" fill="#555"/>
    <circle cx="200.25" cy="258" r="5" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
  </g>

  <circle cx="200" cy="245" r="4" fill="#aaa" stroke="#888" stroke-width="0.5"/>

  <!-- Crown + pushers -->
  <rect x="332" y="232" width="12" height="26" rx="4" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>
  <rect x="332" y="208" width="9" height="14" rx="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="332" y="252" width="9" height="14" rx="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>

  <text x="200" y="448" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c8a84b" letter-spacing="3">ROLEX</text>
  <text x="200" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#666" letter-spacing="3">COSMOGRAPH DAYTONA</text>
</svg>
