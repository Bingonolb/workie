<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bg-sub" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </radialGradient>
    <radialGradient id="dial-sub" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="bezel-sub" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1d5c2a"/>
      <stop offset="60%" stop-color="#0f3d17"/>
      <stop offset="100%" stop-color="#062010"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="case-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="30%" stop-color="#b0b0b0"/>
      <stop offset="70%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="hand-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg-sub)"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="400" x2="400" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Watch group -->
  <g transform="translate(200, 230)" filter="url(#shadow)">

    <!-- Outer case / lugs -->
    <ellipse rx="132" ry="138" fill="url(#case-grad)" stroke="#999" stroke-width="0.5"/>

    <!-- Bezel (green, ceramic-style) -->
    <circle r="126" fill="url(#bezel-sub)"/>
    <!-- Bezel pip at 12 -->
    <rect x="-4" y="-122" width="8" height="10" rx="2" fill="#c8a84b"/>
    <!-- Bezel minute marks -->
    <g stroke="#c8a84b" stroke-width="1.2" opacity="0.7">
      <!-- 5-min marks -->
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(30)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(60)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(90)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(120)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(150)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(180)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(210)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(240)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(270)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(300)"/>
      <line x1="0" y1="-115" x2="0" y2="-108" transform="rotate(330)"/>
    </g>
    <!-- Bezel numbers -->
    <text x="0" y="-96" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8a84b" font-weight="bold">10</text>
    <text x="96" y="4" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8a84b" font-weight="bold">20</text>
    <text x="-96" y="4" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8a84b" font-weight="bold">40</text>

    <!-- Inner bezel ring -->
    <circle r="106" fill="#111111" stroke="#333" stroke-width="1"/>

    <!-- Dial -->
    <circle r="102" fill="url(#dial-sub)"/>

    <!-- Hour indices (applied, luminescent) -->
    <g fill="#c8a84b">
      <!-- 12 o'clock: two rectangles -->
      <rect x="-5" y="-88" width="5" height="16" rx="1"/>
      <rect x="2" y="-88" width="5" height="16" rx="1"/>
      <!-- 3 o'clock: rectangle -->
      <rect x="72" y="-5" width="16" height="5" rx="1" transform="rotate(90 80,0)"/>
      <!-- 6 o'clock: rectangle -->
      <rect x="-5" y="72" width="10" height="16" rx="1"/>
      <!-- 9 o'clock: rectangle -->
      <rect x="-88" y="-5" width="16" height="5" rx="1" transform="rotate(90 -80,0)"/>
    </g>
    <!-- Other hour indices -->
    <g fill="#9aab8a" opacity="0.9">
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(30)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(60)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(120)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(150)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(210)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(240)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(300)"/>
      <rect x="-5" y="-88" width="10" height="15" rx="1" transform="rotate(330)"/>
    </g>

    <!-- Date window at 3 o'clock -->
    <rect x="60" y="-10" width="22" height="16" rx="2" fill="#ffffff"/>
    <text x="71" y="2" text-anchor="middle" font-family="Arial" font-size="9" fill="#000" font-weight="bold">28</text>

    <!-- Brand logo area -->
    <text x="0" y="-52" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8a84b" letter-spacing="2">ROLEX</text>
    <text x="0" y="-38" text-anchor="middle" font-family="Arial" font-size="7" fill="#888" letter-spacing="1">OYSTER PERPETUAL</text>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial" font-size="8" fill="#aaa" letter-spacing="1.5">SUBMARINER</text>

    <!-- Minute hand -->
    <g transform="rotate(-100)">
      <rect x="-3" y="-82" width="6" height="90" rx="3" fill="url(#hand-grad)"/>
      <rect x="-2" y="-78" width="4" height="40" rx="1" fill="#9aab8a" opacity="0.8"/>
    </g>
    <!-- Hour hand -->
    <g transform="rotate(140)">
      <rect x="-4" y="-55" width="8" height="65" rx="3" fill="url(#hand-grad)"/>
      <rect x="-2" y="-50" width="4" height="26" rx="1" fill="#9aab8a" opacity="0.8"/>
    </g>
    <!-- Seconds hand (red tip) -->
    <g transform="rotate(200)">
      <rect x="-1" y="-86" width="2" height="70" rx="1" fill="#e83232"/>
      <rect x="-1" y="-16" width="2" height="30" rx="1" fill="#cccccc"/>
    </g>
    <!-- Crown -->
    <circle r="5" fill="#cccccc" stroke="#999" stroke-width="0.5"/>

  </g>

  <!-- Crown (winding crown on the right) -->
  <rect x="332" y="214" width="14" height="28" rx="5" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>

  <!-- Brand name bottom -->
  <text x="200" y="440" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#c8a84b" letter-spacing="3">ROLEX</text>
  <text x="200" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#555" letter-spacing="4">SUBMARINER</text>
</svg>
