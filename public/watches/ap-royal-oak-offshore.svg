<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#080404"/>
    </radialGradient>
    <radialGradient id="dial" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a1010"/>
      <stop offset="100%" stop-color="#180808"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Rubber strap suggestion top -->
  <rect x="162" y="58" width="76" height="58" rx="12" fill="#1a1a1a"/>
  <rect x="170" y="60" width="60" height="55" rx="10" fill="#252525"/>
  <line x1="170" y1="75" x2="230" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="170" y1="90" x2="230" y2="90" stroke="#333" stroke-width="1"/>

  <!-- Rubber strap bottom -->
  <rect x="162" y="370" width="76" height="60" rx="12" fill="#1a1a1a"/>
  <rect x="170" y="372" width="60" height="57" rx="10" fill="#252525"/>
  <line x1="170" y1="390" x2="230" y2="390" stroke="#333" stroke-width="1"/>
  <line x1="170" y1="405" x2="230" y2="405" stroke="#333" stroke-width="1"/>

  <!-- Case (larger, thicker, octagonal offshore) -->
  <polygon points="200,100 290,122 322,210 322,278 290,366 200,388 110,366 78,278 78,210 110,122" fill="#999"/>
  <polygon points="200,105 286,126 317,212 317,276 286,362 200,383 114,362 83,276 83,212 114,126" fill="#c0c0c0"/>

  <!-- Crown guards (Offshore signature) -->
  <rect x="317" y="220" width="18" height="12" rx="3" fill="#aaa" stroke="#888" stroke-width="0.5"/>
  <rect x="317" y="250" width="18" height="12" rx="3" fill="#aaa" stroke="#888" stroke-width="0.5"/>

  <!-- 8 screws -->
  <g fill="#777" stroke="#555" stroke-width="0.5">
    <circle cx="142" cy="143" r="7"/><line x1="138" y1="143" x2="146" y2="143" stroke="#444" stroke-width="1"/><line x1="142" y1="139" x2="142" y2="147" stroke="#444" stroke-width="1"/>
    <circle cx="258" cy="143" r="7"/><line x1="254" y1="143" x2="262" y2="143" stroke="#444" stroke-width="1"/><line x1="258" y1="139" x2="258" y2="147" stroke="#444" stroke-width="1"/>
    <circle cx="98" cy="220" r="7"/><line x1="94" y1="220" x2="102" y2="220" stroke="#444" stroke-width="1"/><line x1="98" y1="216" x2="98" y2="224" stroke="#444" stroke-width="1"/>
    <circle cx="302" cy="220" r="7"/><line x1="298" y1="220" x2="306" y2="220" stroke="#444" stroke-width="1"/><line x1="302" y1="216" x2="302" y2="224" stroke="#444" stroke-width="1"/>
    <circle cx="98" cy="300" r="7"/><line x1="94" y1="300" x2="102" y2="300" stroke="#444" stroke-width="1"/><line x1="98" y1="296" x2="98" y2="304" stroke="#444" stroke-width="1"/>
    <circle cx="302" cy="300" r="7"/><line x1="298" y1="300" x2="306" y2="300" stroke="#444" stroke-width="1"/><line x1="302" y1="296" x2="302" y2="304" stroke="#444" stroke-width="1"/>
    <circle cx="142" cy="377" r="7"/><line x1="138" y1="377" x2="146" y2="377" stroke="#444" stroke-width="1"/><line x1="142" y1="373" x2="142" y2="381" stroke="#444" stroke-width="1"/>
    <circle cx="258" cy="377" r="7"/><line x1="254" y1="377" x2="262" y2="377" stroke="#444" stroke-width="1"/><line x1="258" y1="373" x2="258" y2="381" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Dial (mega tapisserie, dark red) -->
  <polygon points="200,126 278,146 306,215 306,275 278,344 200,362 122,344 94,275 94,215 122,146" fill="url(#dial)"/>

  <!-- Mega tapisserie grid -->
  <g stroke="#3a1818" stroke-width="0.8" opacity="0.8">
    <line x1="110" y1="160" x2="290" y2="160"/><line x1="110" y1="178" x2="290" y2="178"/><line x1="110" y1="196" x2="290" y2="196"/><line x1="110" y1="214" x2="290" y2="214"/><line x1="110" y1="250" x2="290" y2="250"/><line x1="110" y1="268" x2="290" y2="268"/><line x1="110" y1="286" x2="290" y2="286"/><line x1="110" y1="304" x2="290" y2="304"/><line x1="110" y1="322" x2="290" y2="322"/>
    <line x1="140" y1="148" x2="140" y2="356"/><line x1="164" y1="142" x2="164" y2="362"/><line x1="188" y1="138" x2="188" y2="365"/><line x1="212" y1="138" x2="212" y2="365"/><line x1="236" y1="142" x2="236" y2="362"/><line x1="260" y1="148" x2="260" y2="356"/>
  </g>

  <!-- Sub-dials -->
  <circle cx="148" cy="255" r="28" fill="#1a0a0a" stroke="#555" stroke-width="0.8"/>
  <line x1="148" y1="255" x2="148" y2="234" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="252" cy="255" r="28" fill="#1a0a0a" stroke="#555" stroke-width="0.8"/>
  <line x1="252" y1="255" x2="252" y2="234" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="318" r="22" fill="#1a0a0a" stroke="#555" stroke-width="0.8"/>
  <line x1="200" y1="318" x2="200" y2="302" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hour indices -->
  <g fill="#c8a84b" opacity="0.9">
    <rect x="196" y="142" width="8" height="16" rx="1"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(30,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(60,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(90,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(120,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(150,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(180,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(210,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(240,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(270,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(300,200,255)"/><rect x="196" y="142" width="8" height="16" rx="1" transform="rotate(330,200,255)"/>
  </g>

  <text x="200" y="198" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" fill="#c8a84b" letter-spacing="1.5">AUDEMARS PIGUET</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#888" letter-spacing="1">ROYAL OAK OFFSHORE</text>
  <text x="200" y="222" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">CHRONOGRAPH · 42mm</text>

  <!-- Hands -->
  <g transform="rotate(-50, 200, 255)"><rect x="197.5" y="170" width="5" height="88" rx="2.5" fill="#c8a84b"/></g>
  <g transform="rotate(110, 200, 255)"><rect x="198" y="188" width="4" height="65" rx="2" fill="#c8a84b"/></g>
  <g transform="rotate(200, 200, 255)"><rect x="199.5" y="165" width="1.5" height="82" rx="0.75" fill="#e84040"/></g>
  <circle cx="200" cy="255" r="5" fill="#c8a84b"/>

  <!-- Crown -->
  <rect x="322" y="240" width="13" height="26" rx="4" fill="#bbb" stroke="#999" stroke-width="0.5"/>

  <text x="200" y="448" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#c8a84b" letter-spacing="2">AUDEMARS PIGUET</text>
  <text x="200" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#555" letter-spacing="2">ROYAL OAK OFFSHORE</text>
</svg>
