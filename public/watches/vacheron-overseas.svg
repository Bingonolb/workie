<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#08101e"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="dial" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a5ca8"/>
      <stop offset="100%" stop-color="#102448"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Case (round, brushed/polished) -->
  <circle cx="200" cy="245" r="138" fill="#b8b8b8"/>
  <circle cx="200" cy="245" r="134" fill="#d5d5d5"/>

  <!-- Bezel (integrated malt cross pattern) -->
  <circle cx="200" cy="245" r="128" fill="#1e1e1e"/>

  <!-- Malt cross decorative elements on bezel -->
  <g fill="none" stroke="#888" stroke-width="0.8" opacity="0.6">
    <circle cx="200" cy="245" r="120"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(0,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(30,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(60,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(90,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(120,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(150,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(180,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(210,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(240,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(270,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(300,200,245)"/>
    <line x1="200" y1="125" x2="200" y2="133" transform="rotate(330,200,245)"/>
  </g>

  <!-- Malt cross at 12 (Vacheron emblem) -->
  <g transform="translate(200, 134)" fill="#c8a84b">
    <polygon points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" opacity="0.8"/>
  </g>

  <!-- Inner bezel -->
  <circle cx="200" cy="245" r="113" fill="#111" stroke="#333" stroke-width="0.5"/>

  <!-- Dial -->
  <circle cx="200" cy="245" r="109" fill="url(#dial)"/>

  <!-- Sunray texture lines -->
  <g stroke="#1e4080" stroke-width="0.6" opacity="0.5">
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(5,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(10,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(15,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(20,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(25,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(35,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(40,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(45,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(50,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(55,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(65,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(70,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(75,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(80,200,245)"/>
    <line x1="200" y1="138" x2="200" y2="354" transform="rotate(85,200,245)"/>
  </g>

  <!-- Hour indices (baton, gold) -->
  <g fill="#d4af37">
    <rect x="196" y="150" width="8" height="16" rx="1"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(30,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(60,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(90,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(120,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(150,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(180,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(210,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(240,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(270,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(300,200,245)"/>
    <rect x="196" y="150" width="8" height="16" rx="1" transform="rotate(330,200,245)"/>
  </g>

  <!-- Date at 3 -->
  <rect x="255" y="237" width="22" height="15" rx="2" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
  <text x="266" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#111" font-weight="700">22</text>

  <!-- Brand text -->
  <text x="200" y="202" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#d4af37" letter-spacing="1.5">VACHERON CONSTANTIN</text>
  <text x="200" y="214" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#8ab0e0" letter-spacing="1">GENÈVE · 1755</text>
  <text x="200" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="#b8d0f0" letter-spacing="2">OVERSEAS</text>

  <!-- Hands (blue/gold) -->
  <g transform="rotate(-30, 200, 245)">
    <rect x="197" y="164" width="6" height="84" rx="3" fill="#d4af37"/>
  </g>
  <g transform="rotate(130, 200, 245)">
    <rect x="198" y="178" width="4" height="64" rx="2" fill="#d4af37"/>
  </g>
  <g transform="rotate(210, 200, 245)">
    <rect x="199.5" y="158" width="1.5" height="74" rx="0.75" fill="#6090e0"/>
    <rect x="199.5" y="232" width="1.5" height="18" rx="0.75" fill="#888"/>
  </g>
  <circle cx="200" cy="245" r="5" fill="#d4af37"/>

  <!-- Crown -->
  <rect x="335" y="232" width="13" height="26" rx="4.5" fill="#c8c8c8" stroke="#aaa" stroke-width="0.5"/>

  <text x="200" y="448" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4af37" letter-spacing="2">VACHERON CONSTANTIN</text>
  <text x="200" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#2a5ca8" letter-spacing="4">OVERSEAS</text>
</svg>
