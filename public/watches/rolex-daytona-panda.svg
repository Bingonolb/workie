<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Shadow -->
  <ellipse cx="200" cy="245" rx="135" ry="140" fill="#000" fill-opacity="0.4"/>

  <!-- Case -->
  <rect x="60" y="95" width="280" height="300" rx="28" fill="#d8d8d8"/>
  <rect x="64" y="99" width="272" height="292" rx="25" fill="#e8e8e8"/>

  <!-- Tachymeter bezel (black) -->
  <circle cx="200" cy="245" r="128" fill="#111111"/>
  <!-- Tachymeter text ring -->
  <circle cx="200" cy="245" r="122" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="200" y="133" text-anchor="middle" font-family="Arial" font-size="7" fill="#ccc" letter-spacing="1">TACHYMETRE</text>
  <!-- Small tach numbers -->
  <g font-family="Arial" font-size="7" fill="#ccc" text-anchor="middle">
    <text x="200" y="133" transform="rotate(0,200,245)">400</text>
    <text x="200" y="133" transform="rotate(36,200,245)">200</text>
    <text x="200" y="133" transform="rotate(72,200,245)">160</text>
    <text x="200" y="133" transform="rotate(108,200,245)">140</text>
    <text x="200" y="133" transform="rotate(144,200,245)">120</text>
    <text x="200" y="133" transform="rotate(180,200,245)">100</text>
  </g>

  <!-- Dial (white) -->
  <circle cx="200" cy="245" r="108" fill="#f5f5f0"/>
  <circle cx="200" cy="245" r="104" fill="#f8f8f3"/>

  <!-- 3 sub-dials (chronograph - black = Panda) -->
  <!-- 9h sub-dial -->
  <circle cx="148" cy="255" r="26" fill="#1a1a1a" stroke="#444" stroke-width="0.5"/>
  <line x1="148" y1="255" x2="148" y2="234" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="148" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#777">60</text>
  <!-- 3h sub-dial -->
  <circle cx="252" cy="255" r="26" fill="#1a1a1a" stroke="#444" stroke-width="0.5"/>
  <line x1="252" y1="255" x2="252" y2="234" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="252" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#777">12</text>
  <!-- 6h sub-dial -->
  <circle cx="200" cy="310" r="22" fill="#1a1a1a" stroke="#444" stroke-width="0.5"/>
  <line x1="200" y1="310" x2="200" y2="293" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="200" y="344" text-anchor="middle" font-family="Arial" font-size="6" fill="#777">30</text>

  <!-- Hour indices -->
  <g fill="#222" font-family="Arial" font-size="8" font-weight="700" text-anchor="middle">
    <text x="200" y="158">12</text>
    <text x="286" y="185">3</text>
    <text x="200" y="344">6</text>
    <text x="114" y="185">9</text>
  </g>
  <!-- Index dots -->
  <g fill="#333">
    <circle cx="235" cy="162" r="3"/>
    <circle cx="261" cy="172" r="3"/>
    <circle cx="280" cy="207" r="3"/>
    <circle cx="165" cy="162" r="3"/>
    <circle cx="139" cy="172" r="3"/>
    <circle cx="120" cy="207" r="3"/>
  </g>

  <!-- Brand -->
  <text x="200" y="218" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#111" letter-spacing="2">ROLEX</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial" font-size="6.5" fill="#777" letter-spacing="1">OYSTER PERPETUAL</text>
  <text x="200" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="#333" letter-spacing="1.5">COSMOGRAPH DAYTONA</text>

  <!-- Main hands -->
  <g transform="rotate(-70, 200, 245)">
    <rect x="197.5" y="163" width="5" height="85" rx="2.5" fill="#222"/>
  </g>
  <g transform="rotate(20, 200, 245)">
    <rect x="198" y="178" width="4" height="65" rx="2" fill="#222"/>
  </g>
  <!-- Chrono seconds (red tip style) -->
  <g transform="rotate(100, 200, 245)">
    <rect x="199.5" y="155" width="1.5" height="75" rx="0.75" fill="#cc2222"/>
    <rect x="199.5" y="230" width="1.5" height="20" rx="0.75" fill="#555"/>
  </g>

  <circle cx="200" cy="245" r="4" fill="#aaa" stroke="#777" stroke-width="0.5"/>

  <!-- Crown -->
  <rect x="330" y="232" width="12" height="26" rx="4" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>
  <!-- Chronograph pushers -->
  <rect x="330" y="208" width="9" height="14" rx="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="330" y="252" width="9" height="14" rx="3" fill="#bbb" stroke="#999" stroke-width="0.5"/>

  <text x="200" y="440" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c8a84b" letter-spacing="3">ROLEX</text>
  <text x="200" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#555" letter-spacing="3">DAYTONA</text>
</svg>
