    <rect x="196" y="162" width="8" height="8" rx="1" fill="#e8dcc8" transform="rotate(45,200,166)"/>
  </g>
  <!-- Snowflake minute hand -->
  <g transform="rotate(110, 200, 240)">
    <rect x="197" y="152" width="6" height="92" rx="3" fill="#e8dcc8"/>
